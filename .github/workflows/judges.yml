name: Judges Code Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  judges:
    name: Judges Panel Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run build

      - name: Run Judges (official action)
        id: judges
        uses: KevinRabun/judges@v3.124.5
        continue-on-error: true
        with:
          path: demos
          format: sarif
          diff-only: true
          fail-on-findings: false
          upload-sarif: true

      - name: Upload SARIF to Code Scanning (fallback)
        if: always() && hashFiles('judges-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: judges-results.sarif
          category: judges-panel
        continue-on-error: true

      - name: Fail if critical findings in bad.ts files
        if: always()
        run: |
          CRITICAL="${{ steps.judges.outputs.critical }}"
          VERDICT="${{ steps.judges.outputs.verdict }}"
          echo "Judges verdict: $VERDICT, critical: $CRITICAL"
          # Only fail CI if critical findings exist AND the PR contains bad.ts changes
          if [ "${CRITICAL:-0}" -gt 0 ]; then
            # Check if any bad.ts files are in the PR diff
            BAD_FILES=$(git diff --name-only origin/main...HEAD -- 'demos/**/bad.ts' 2>/dev/null || echo "")
            if [ -n "$BAD_FILES" ]; then
              echo "::error::Critical findings detected in vulnerable code: $BAD_FILES"
              exit 1
            else
              echo "::warning::Critical findings from L1 false positives on fixed code — not failing CI"
            fi
          fi

      - name: Generate markdown report
        if: always()
        run: |
          npm install -g @kevinrabun/judges-cli
          REPORT="# Judges Panel — Findings Report\n\n"
          for file in $(find demos -name '*.ts' -type f | sort); do
            echo "::group::Evaluating $file"
            MD_OUTPUT=$(npx judges eval --file "$file" --format markdown 2>&1 || true)
            REPORT="${REPORT}## ${file}\n\n${MD_OUTPUT}\n\n---\n\n"
            echo "::endgroup::"
          done
          echo -e "$REPORT" > judges-report.md
          echo -e "$REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: judges-report
          path: judges-report.md
